name: Check for Notion links

on:
  push:
    branches:
      - master
    paths:
      - 'content/posts/**/*.md'
  pull_request:
    branches:
      - master
    paths:
      - 'content/posts/**/*.md'

jobs:
  check-notion-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for notion.so links in posts
        run: bash scripts/check-notion-links.sh
